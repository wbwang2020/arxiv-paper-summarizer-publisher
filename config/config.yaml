arxiv:
  keywords:
  - world model
  categories:
  - cs.LG
  - cs.AI
  days_back: 14
  max_results: 5
  sort_by: submittedDate
  sort_order: descending
ai:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  api_url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 8000
  max_input_tokens: 131072
  timeout: 300
  system_prompt: '你是一个专业的学术论文分析助手，擅长深度解析计算机科学和人工智能领域的学术论文。

    你的任务是阅读论文并生成结构化的详细综述，帮助研究人员快速理解论文的核心内容。

    请确保分析全面、准确、客观，并突出论文的创新点和潜在价值。

    '
  prompt_template: '请对以下论文进行详细分析，并按照指定格式生成综述。


    【论文基本信息】

    - 标题：{title}

    - 作者：{authors}

    - 发表年份：{year}

    - arXiv ID：{arxiv_id}


    【论文摘要】

    {abstract}


    【论文全文】

    {content}


    请按照以下结构生成详细综述，每个部分使用二级标题（##）标记：


    ## 1. 基本信息

    必须包括以下信息：

    - **论文标题**: 完整论文标题

    - **作者**: 所有作者姓名

    - **作者单位**: 每个作者所属的机构/单位（如果有）

    - **发表年份**: 论文发表年份

    - **期刊/会议名称**: 发表的期刊或会议名称（如果是arXiv预印本，标注为arXiv）

    - **DOI**: 论文DOI（如果有）


    ## 2. 研究动机（着重分析）

    清晰阐述本研究旨在解决的核心科学问题或技术瓶颈，阐述论文所讨论问题的motivation。若是综述文章，则分析是否存在研究方向的启发式论述。


    ## 3. 核心假设

    明确列出作者提出的核心研究假设或理论构想。


    ## 4. 研究设计（使用长篇幅着重分析）

    概述整体模型构型和理论推导的构建思路，请详细阐述文章的理论模型构建过程，着重分析核心理论公式的意义，以及各引理、定理、推论的形成过程。如果是综述文章的话，则着重分析方法的演化进程。

    注意使用"$...$"分割符区分公式。


    ## 5. 数据/样本来源

    说明数据获取方式、样本规模、选择标准与特征。


    ## 6. 方法与技术（若不是综述文章，则使用长篇幅着重分析）

    详述所使用的关键技术、算法、模型、实验平台、或软件工具，着重阐述算法的构建细节。


    ## 7. 分析流程

    分步说明实验步骤、仿真或实验流程，阐述对比实验中算法的选择情况和消融实验中各模型的选择要点，以及其他实验分析部分的设计情况。


    ## 8. 数据分析

    说明所采用的统计方法、有效性验证手段或性能评价指标。


    ## 9. 核心发现

    提炼研究中最重要、最创新的科学发现或观测现象。


    ## 10. 实验结果

    总结关键的定量结果（如：性能指标、统计显著性）和定性结论。


    ## 11. 辅助结果

    简述其他支持性的次要结果。


    ## 12. 结论

    归纳作者基于证据得出的最终结论。


    ## 13. 贡献

    以苛刻的视角，评价本研究在理论创新、技术突破、方法改进或应用拓展方面对本文章相关领域的具体贡献。


    ## 14. 与研究主题的关联

    分析该工作与我的研究主题或综述方向的核心关联。


    ## 15. 亮点

    模仿一个审稿人的身份，从批判性思维角度出发，指出其值得在综述中重点讨论的亮点（如：开创性、争议性、局限性、未来启示）。


    ## 16. 图表信息

    列出文中重要的Figure和Table的编号、标题及其所展示的核心内容概述，方便快速定位和引用关键证据。


    ## 17. 评价

    从论文审稿人的角度出发，以苛刻的视角，阐述您对该研究的方法严谨性、逻辑完备性和结论可靠性的个人评价。


    ## 18. 疑问

    阅读中产生的疑问或认为其存在的不足之处。


    ## 19. 启发

    该研究为您带来的新思路、新想法或未来可探索的方向。


    ## 20. 参考文献

    列出文中引用的1-2篇最具代表性的参考文献，格式为：“作者，年份，标题”，方便追踪重要学术渊源。


    ---

    请确保输出格式规范，内容详实，分析深入。如果某些部分在论文中没有明确提及，请标注"文中未明确说明"。

    '
  summary_sections:
  - description: 研究动机
    field_name: motivation
    section_number: '2'
  - description: 核心假设
    field_name: core_hypothesis
    section_number: '3'
  - description: 研究设计
    field_name: research_design
    section_number: '4'
  - description: 数据/样本来源
    field_name: data_source
    section_number: '5'
  - description: 方法与技术
    field_name: methods
    section_number: '6'
  - description: 分析流程
    field_name: analysis_process
    section_number: '7'
  - description: 数据分析
    field_name: data_analysis
    section_number: '8'
  - description: 核心发现
    field_name: core_findings
    section_number: '9'
  - description: 实验结果
    field_name: experimental_results
    section_number: '10'
  - description: 辅助结果
    field_name: supporting_results
    section_number: '11'
  - description: 结论
    field_name: conclusions
    section_number: '12'
  - description: 贡献
    field_name: contributions
    section_number: '13'
  - description: 与研究主题的关联
    field_name: relevance
    section_number: '14'
  - description: 亮点
    field_name: highlights
    section_number: '15'
  - description: 图表信息
    field_name: figures_tables
    field_type: list
    section_number: '16'
  - description: 评价
    field_name: evaluation
    section_number: '17'
  - description: 疑问
    field_name: questions
    section_number: '18'
  - description: 启发
    field_name: inspiration
    section_number: '19'
  - description: 参考文献
    field_name: references
    field_type: list
    section_number: '20'
storage:
  base_dir: ./papers
  format: markdown
  filename_template: '{date}_{arxiv_id}_{title}'
  organize_by: date
  include_metadata: false
zhihu:
  enabled: true
  cookie: ${ZHIHU_COOKIE}
  column_name: ''
  create_column_if_not_exists: false
  draft_first: false
  auto_publish: true
  content_fill_mode: import_document
  debug: false
scheduler:
  cron: 0 9 * * *
  enabled: true
  timezone: Asia/Shanghai
